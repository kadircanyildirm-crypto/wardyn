# cargo-deny configuration — supply-chain gate for the Cargo workspace.
# Run locally with: cargo deny check
# See https://embarkstudios.github.io/cargo-deny/

[graph]
# Only the targets Wardyn actually builds for.
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "bpfel-unknown-none",
]
all-features = true

[advisories]
version = 2
# Pull from the default RustSec advisory DB. `yanked = "deny"` fails the build on
# a yanked crate; unmaintained advisories warn rather than block a release.
yanked = "deny"
unmaintained = "workspace"
ignore = []

[licenses]
version = 2
# Don't warn about pre-allowed licenses that no current dependency happens to use;
# the list is intentionally broad so a future permissive dep doesn't break CI.
unused-allowed-license = "allow"
# Wardyn itself is AGPL-3.0; its dependencies remain permissive (that direction is
# compatible). Both must be on the allow list so `cargo deny` passes.
allow = [
    "AGPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "0BSD",
]
confidence-threshold = 0.8

[bans]
# Duplicate versions are common in large trees; warn instead of failing the build.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
